<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=vpn_key" />
    <title>Tela Login</title>
</head>
<body>
    <main>
        <section>
            <div id="foto">
        
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja nem-vindo(a) novamente. Faça login para acessar sua conta e poder dazer as configurações no seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <img src="img/people.png" alt="Email">
                        <input type="email" name="login" id="ilogin" placeholder="Seu E-mail" autocomplete="email" required maxlength="30">
                        <label for="ilogin">Login</label>

                    </div>
                    <div class="campo">
                       <span class="material-symbols-outlined">vpn_key</span>
                       <input type="password" name="senha" id="isenha" placeholder="Sua Senha" autocomplete="current-password" required maxlength="20" minlength="8">
                       <label for="isenha">Senha</label>

                    </div>
                    <div>
                        <input type="submit" value="Enviar" id="enviar">
                        <a href="esqueci.html">Esqueci a senha</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
